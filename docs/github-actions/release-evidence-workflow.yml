name: evydence-release-evidence

on:
  workflow_dispatch:

jobs:
  release-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -o dist/evydence ./cmd/evydence
      - run: dist/evydence hash dist/evydence > artifact.digest
      - name: Upload build provenance
        env:
          EVYDENCE_API_URL: ${{ secrets.EVYDENCE_API_URL }}
          EVYDENCE_API_KEY: ${{ secrets.EVYDENCE_API_KEY }}
          EVYDENCE_PROJECT_ID: ${{ vars.EVYDENCE_PROJECT_ID }}
          EVYDENCE_RELEASE_ID: ${{ vars.EVYDENCE_RELEASE_ID }}
          EVYDENCE_ARTIFACT_ID: ${{ vars.EVYDENCE_ARTIFACT_ID }}
          EVYDENCE_ARTIFACT_DIGEST: ${{ vars.EVYDENCE_ARTIFACT_DIGEST }}
        run: |
          dist/evydence github-actions upload-build \
            --url "$EVYDENCE_API_URL" \
            --api-key "$EVYDENCE_API_KEY" \
            --project-id "$EVYDENCE_PROJECT_ID" \
            --release-id "$EVYDENCE_RELEASE_ID" \
            --artifact-id "$EVYDENCE_ARTIFACT_ID" \
            --artifact-digest "$EVYDENCE_ARTIFACT_DIGEST"
