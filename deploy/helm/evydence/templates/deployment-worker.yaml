{{- $imageTag := required "image.tag is required for Evydence release installs" .Values.image.tag -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evydence.fullname" . }}-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "evydence.name" . }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "evydence.name" . }}
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["evydence-worker"]
          envFrom:
            - configMapRef:
                name: {{ include "evydence.fullname" . }}-config
          env:
            - name: EVYDENCE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: {{ .Values.env.databaseURLSecretKey }}
            - name: EVYDENCE_API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: {{ .Values.env.apiKeyPepperSecretKey }}
          {{- if .Values.worker.probes.enabled }}
          readinessProbe:
            exec:
              command:
                {{- toYaml .Values.worker.probes.readinessCommand | nindent 16 }}
          livenessProbe:
            exec:
              command:
                {{- toYaml .Values.worker.probes.livenessCommand | nindent 16 }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
