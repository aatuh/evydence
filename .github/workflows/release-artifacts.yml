name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.1.0"
        required: true
        type: string
      upload_draft_release:
        description: "Create or update a draft GitHub release with the generated artifacts"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Package Signed Release Artifacts
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: evydence
          POSTGRES_USER: evydence
          POSTGRES_PASSWORD: change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U evydence"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      EVYDENCE_API_KEY_PEPPER: ci-test-pepper
      EVYDENCE_TEST_DATABASE_URL: postgres://evydence:change-me@localhost:5432/evydence?sslmode=disable
      EVYDENCE_RELEASE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.EVYDENCE_RELEASE_SIGNING_PRIVATE_KEY_B64 }}
      EVYDENCE_RELEASE_ALLOW_EXISTING_TAG: ${{ github.ref_type == 'tag' && '1' || '0' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+){1,2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must look like v1.2.3 or v1.2.3-rc.1" >&2
            exit 2
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install QA tools
        run: make tools

      - name: Require release signing secret
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${EVYDENCE_RELEASE_SIGNING_PRIVATE_KEY_B64}" ]]; then
            echo "EVYDENCE_RELEASE_SIGNING_PRIVATE_KEY_B64 secret is required to sign release artifacts" >&2
            exit 2
          fi

      - name: Package signed release candidate
        shell: bash
        run: |
          set -euo pipefail
          # scripts/release_candidate_package.sh runs make production-check before artifact packaging.
          # The generated dist/<tag>/ evidence set includes evydence-release-manifest.sig.json.
          scripts/release_candidate_package.sh "${{ steps.release.outputs.tag }}"

      - name: Upload packaged release evidence
        uses: actions/upload-artifact@v7
        with:
          name: evydence-release-artifacts-${{ steps.release.outputs.tag }}
          path: dist/${{ steps.release.outputs.tag }}/
          if-no-files-found: error

      - name: Create or update draft GitHub release
        if: github.event_name == 'push' || github.event.inputs.upload_draft_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/${tag}/* --clobber
          else
            gh release create "${tag}" dist/${tag}/* --draft --title "Evydence ${tag}" --notes-file "dist/${tag}/release-notes.md"
          fi
